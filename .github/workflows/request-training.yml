name: Request Training Run

# Triggers a training run in the training repo.
#
# Each user provides their OWN dataset and params.yaml uploaded to S3.
# The workflow downloads both, publishes them to the trigger path, and fires
# a repository_dispatch to the training repo.  The training repo pulls the
# trigger and runs the full pipeline (ingest → dataset → features → train →
# rank_compare → promote).
#
# Required secrets  (mlops_app repo):
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_DEFAULT_REGION
#   APP_S3_BUCKET          — bucket where trigger artefacts are uploaded
#   TRAINING_REPO_TOKEN    — fine-grained GitHub PAT (Contents:write +
#                            Workflows:write on the training repo only)
#
# Required variables (mlops_app repo):
#   APP_ID          — application scope, e.g. "price_forecast"
#   APP_MODEL_NAME  — registry model name, e.g. "price_forecast_model"
#   TRAINING_REPO   — "org/mlops"  (no https://, no .git)
#
# Optional variables:
#   STACK_ID              — default "MLOPS"
#   TRAINING_AUTO_PROMOTE — default "false"

on:
  workflow_dispatch:
    inputs:
      app_id:
        description: "Your app identifier — lowercase letters, numbers, hyphens (e.g. alice, bob-sales, app1). Must be unique per user/project."
        required: true
      dataset_s3_uri:
        description: "S3 URI of the user's dataset (CSV or Parquet) — e.g. s3://central-bucket/alice/sales.csv"
        required: true
      params_s3_uri:
        description: "S3 URI of the user's params.yaml — e.g. s3://central-bucket/alice/params.yaml"
        required: true
      model_family:
        description: "Model family to train"
        required: true
        default: "regression"
        type: choice
        options: ["regression", "classification", "forecasting"]
      description:
        description: "Human-readable description for this training run"
        required: false
        default: ""
      auto_promote:
        description: "Automatically promote if challenger beats champion"
        type: boolean
        required: false
        default: false

jobs:
  request-training:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production

    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION:    ${{ secrets.AWS_DEFAULT_REGION }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # ── Download user's dataset from S3 ────────────────────────────────────
      # Preserve the file extension (csv / parquet) so the publisher correctly
      # infers dataset_format from the local filename.
      - name: Download dataset from S3
        run: |
          DATASET_URI="${{ inputs.dataset_s3_uri }}"
          EXT="${DATASET_URI##*.}"
          echo "DATASET_LOCAL=dataset.${EXT}" >> "$GITHUB_ENV"
          aws s3 cp "${DATASET_URI}" "dataset.${EXT}"

      # ── Download user's params.yaml from S3 ────────────────────────────────
      # Users upload their own params.yaml (with their feature columns, target,
      # metrics, etc.) to S3.  We download it here so the publisher can upload
      # it to the canonical trigger path alongside the dataset.
      - name: Download params from S3
        run: |
          aws s3 cp "${{ inputs.params_s3_uri }}" params_user.yaml
          echo "PARAMS_LOCAL=params_user.yaml" >> "$GITHUB_ENV"
          echo "--- params.yaml preview ---"
          head -40 params_user.yaml

      # ── Push trigger bundle to S3 + dispatch training repo ─────────────────
      - name: Push training trigger to S3 and dispatch training repo
        env:
          APP_ID:                ${{ inputs.app_id }}
          APP_S3_BUCKET:         ${{ secrets.APP_S3_BUCKET }}
          APP_MODEL_NAME:        ${{ vars.APP_MODEL_NAME }}
          APP_CHANNEL:           stable
          ENV:                   prod
          STACK_ID:              ${{ vars.STACK_ID || 'MLOPS' }}
          TRAINING_REPO:         ${{ vars.TRAINING_REPO }}
          TRAINING_REPO_TOKEN:   ${{ secrets.TRAINING_REPO_TOKEN }}
          TRAINING_AUTO_PROMOTE: ${{ inputs.auto_promote }}
          TRIGGER_DATA_ROOT:     ${{ github.workspace }}
          APP_ADMIN_TOKEN:       ${{ secrets.APP_ADMIN_TOKEN }}
        run: |
          price-forecast-trigger \
            --dataset  "${DATASET_LOCAL}" \
            --params   "${PARAMS_LOCAL}" \
            --model-family "${{ inputs.model_family }}" \
            --description  "${{ inputs.description }}" \
            --requested-by "${{ github.actor }}"
