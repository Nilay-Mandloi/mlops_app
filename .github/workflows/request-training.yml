name: Request Training Run

# Triggers a training run in the training repo by uploading a dataset + params
# to S3, then firing a repository_dispatch event. The training repo picks up
# the trigger and runs the full pipeline.
#
# Supports both CSV and Parquet datasets. The file extension from dataset_s3_uri
# is preserved so the publisher auto-detects the correct dataset_format.
#
# Required secrets:
#   APP_S3_BUCKET, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_DEFAULT_REGION
#   TRAINING_REPO_TOKEN  (PAT with Contents:write on the training repo)
# Required variables:
#   APP_ID, APP_MODEL_NAME, TRAINING_REPO  (e.g. "my-org/mlops")
# Optional variables:
#   STACK_ID (default: MLOPS), TRAINING_AUTO_PROMOTE (default: false)

on:
  workflow_dispatch:
    inputs:
      dataset_s3_uri:
        description: "S3 URI of the dataset (CSV or Parquet, e.g. s3://bucket/data/sales.csv)"
        required: true
      model_family:
        description: "Model family to train"
        required: true
        default: "regression"
        type: choice
        options: ["regression", "classification", "forecasting"]
      params_path:
        description: "Path to params.yaml in this repo (relative to repo root)"
        required: false
        default: "params.yaml"
      description:
        description: "Human-readable description for this training run"
        required: false
        default: ""
      auto_promote:
        description: "Automatically promote if challenger beats champion"
        type: boolean
        required: false
        default: false

jobs:
  request-training:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production

    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION:    ${{ secrets.AWS_DEFAULT_REGION }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # Preserve the file extension from the S3 URI so the publisher correctly
      # infers the dataset_format (csv vs parquet) from the local filename.
      # Hardcoding "dataset.parquet" would mislabel CSV files and corrupt the
      # trigger contract that the training repo reads.
      - name: Download dataset from S3
        run: |
          DATASET_URI="${{ inputs.dataset_s3_uri }}"
          EXT="${DATASET_URI##*.}"
          echo "DATASET_LOCAL=dataset.${EXT}" >> "$GITHUB_ENV"
          aws s3 cp "${DATASET_URI}" "dataset.${EXT}"

      - name: Push training trigger to S3 and dispatch training repo
        env:
          APP_ID:                ${{ vars.APP_ID }}
          APP_S3_BUCKET:         ${{ secrets.APP_S3_BUCKET }}
          APP_MODEL_NAME:        ${{ vars.APP_MODEL_NAME }}
          APP_CHANNEL:           stable
          ENV:                   prod
          STACK_ID:              ${{ vars.STACK_ID || 'MLOPS' }}
          TRAINING_REPO:         ${{ vars.TRAINING_REPO }}
          TRAINING_REPO_TOKEN:   ${{ secrets.TRAINING_REPO_TOKEN }}
          TRAINING_AUTO_PROMOTE: ${{ inputs.auto_promote }}
          TRIGGER_DATA_ROOT:     ${{ github.workspace }}
        run: |
          price-forecast-trigger push \
            --dataset "${DATASET_LOCAL}" \
            --params "${{ inputs.params_path }}" \
            --model-family "${{ inputs.model_family }}" \
            --description "${{ inputs.description }}" \
            --requested-by "${{ github.actor }}"
