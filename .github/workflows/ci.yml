name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Unit tests
        env:
          ENV: test
          APP_ID: testapp
          APP_S3_BUCKET: test-bucket
          APP_MODEL_NAME: price_forecast
          APP_ADMIN_TOKEN: test-secret
          TRIGGER_DATA_ROOT: /tmp
          # Set when both repos are checked out together (e.g. via actions/checkout
          # with a path: override). Enables test_contract_sync.py.
          MLOPS_ROOT: ${{ vars.MLOPS_ROOT || '' }}
        run: pytest tests/unit/ -v --tb=short --cov=src --cov-report=term-missing

      - name: Integration tests
        if: ${{ vars.RUN_INTEGRATION_TESTS == 'true' }}
        env:
          ENV: test
          APP_ID: testapp
          APP_S3_BUCKET: test-bucket
          APP_MODEL_NAME: price_forecast
          APP_ADMIN_TOKEN: test-secret
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: testing
          AWS_SECRET_ACCESS_KEY: testing
        run: pytest tests/integration/ -v --tb=short

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest
