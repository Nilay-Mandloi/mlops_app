################################################################################
# params.yaml — serving-side training contract
#
# This file is uploaded to S3 as part of every training trigger and consumed by
# the training repo as its runtime configuration. Edit here when you need to
# change dataset schema, feature columns, evaluation metrics, or promotion
# behaviour for THIS application.
#
# Usage:
#   Automatically via POST /trigger-train (dataset_path + this file).
#   Manually via GitHub Actions: .github/workflows/request-training.yml.
#   Directly via CLI: price-forecast-trigger push --dataset ... --params params.yaml
################################################################################

dataset:
  name: price_forecast

  # Source URI is overridden at trigger time (the trigger upload replaces this).
  # Leave blank here; the publisher sets it from the uploaded dataset path.
  input_uri: ""

  target_column: target

  # Rename map applied before any other processing. Add entries if your
  # raw dataset uses different column names than the feature columns below.
  column_rename_map: {}

  date_column: ""
  task_type: regression          # regression | classification

  split_strategy: auto
  test_size: 0.1
  valid_size: 0.1
  random_state: 42

  schema_version: "1.0"

  # Columns that must be present in the raw dataset.
  required_columns:
    - target

  # Model input features. Keep this list in sync with the serving app's
  # /predict endpoint — requests must include exactly these keys.
  feature_columns:
    - feature_1
    - feature_2
    - feature_3

  allow_extra_columns: false
  nullable_columns: []
  optional_features: []
  optional_feature_defaults: {}
  exclude_columns: []
  drop_columns: []
  id_columns: []

  dtype_map: {}
  feature_types: {}
  categorical_columns: []
  numeric_columns: []
  text_columns: []
  datetime_columns: []

  preprocessing:
    imputation_strategy: median
    scaling: false
    use_date_features: false
    datetime_handling: drop

  input_format: ""
  output_format: ""
  csv_sep: ","
  csv_encoding: "utf-8"


paths:
  raw_data_csv: data/raw/train.csv
  clean_data_path: data/processed/clean.csv
  train_data_csv: data/processed/train.csv
  test_data_csv: data/processed/test.csv
  predictions_csv: data/processed/predictions.csv


feature_store:
  feature_set_name: price_forecast_features_v1
  store_root: data/feature_store


evaluation_config:
  primary_metric: rmse
  secondary_metrics:
    - mae
    - r2
  metric_directions:
    rmse: lower
    mae: lower
    r2: higher
  thresholds: {}


promotion:
  mode: auto                     # auto | manual | disabled
  min_improvement: 0.01          # challenger must beat champion by at least 1%
  snapshot_enabled: true         # publish model.pkl + manifest to S3
  auto_promote: true             # set false to require manual approval


training:
  max_workers: 2
  auto_promote: true
